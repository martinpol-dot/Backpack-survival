<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Backpack Survival V2</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#0e1210;color:#f7ead0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.app{max-width:520px;margin:auto;padding:calc(10px + env(safe-area-inset-top)) 12px calc(18px + env(safe-area-inset-bottom));min-height:100vh;background:linear-gradient(#182019,#0d100d)}
h1{font-size:22px;margin:4px 0 8px;color:#ffd36b}.top{display:flex;justify-content:space-between;gap:6px;font-weight:750}.pill{background:#263027;border:1px solid #5e704e;border-radius:11px;padding:6px 9px;font-size:13px}
.arena{position:relative;height:235px;margin-top:10px;overflow:hidden;border:2px solid #536247;border-radius:18px;background:linear-gradient(#344c58 0 48%,#5b7046 48% 55%,#40372b 55%);box-shadow:inset 0 -35px 60px #201b16}
.arena:before{content:"";position:absolute;left:0;right:0;top:55%;height:2px;background:#78664d}
.hero{position:absolute;left:13px;bottom:31px;font-size:55px;z-index:4;filter:drop-shadow(0 3px 2px #000)}
.heroHp{position:absolute;left:10px;bottom:10px;width:92px;height:9px;background:#401b1b;border-radius:8px;overflow:hidden;z-index:5}.heroHp div{height:100%;background:#45bf63}
.enemy{position:absolute;right:-65px;bottom:33px;font-size:49px;z-index:3;transition:transform .08s linear;filter:drop-shadow(0 3px 2px #000)}.enemyName{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;white-space:nowrap;background:#241713;padding:2px 5px;border-radius:6px}.enemyBar{position:absolute;top:-7px;left:3px;width:46px;height:5px;background:#511;border-radius:4px;overflow:hidden}.enemyBar div{height:100%;background:#e25448}
.projectile{position:absolute;font-size:24px;z-index:6;pointer-events:none}.hit{animation:hit .16s}@keyframes hit{50%{transform:scale(1.22)}}.status{position:absolute;left:0;right:0;top:8px;text-align:center;font-size:12px;color:#ffe3a3;text-shadow:0 1px 2px #000}
.panel{background:#1d241e;border:1px solid #526046;border-radius:16px;padding:11px;margin-top:10px}h2{font-size:16px;margin:0 0 9px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.choice{background:#313b2e;border:1px solid #71825c;border-radius:11px;padding:7px;text-align:center;font-size:11px}.icon{display:block;font-size:29px}.choice button{border:0;border-radius:8px;background:#d99a38;color:#1c1308;font-weight:800;padding:7px 9px;margin-top:5px}.choice button:disabled{opacity:.35}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.slot{aspect-ratio:1;background:#111713;border:1px dashed #596554;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative}.slot.filled{background:#303a2c;border-style:solid;border-color:#7b8b65}.slot .itemIcon{font-size:30px}.lvl{position:absolute;right:3px;top:3px;background:#9a5a22;border-radius:7px;padding:1px 5px;font-size:10px}.slot.selected{outline:3px solid #f3bd52}.slot .name{position:absolute;bottom:2px;font-size:8px;color:#ddd}
.help{font-size:11px;color:#b9b7a6;margin-top:7px}.actions{display:flex;gap:7px;margin-top:10px}button.main{flex:1;border:0;border-radius:10px;padding:12px;background:#d99a38;font-weight:850;font-size:15px;color:#1b1208}.secondary{background:#53604d!important;color:#fff!important}.disabled{opacity:.4;pointer-events:none}
</style></head>
<body><main class="app">
<h1>⚔️ Backpack Survival V2</h1>
<div class="top"><div class="pill">Welle <span id="wave">1</span></div><div class="pill">💀 <span id="kills">0</span></div><div class="pill">❤️ <span id="hpText">100</span></div><div class="pill">🎒 <span id="used">0</span>/12</div></div>
<section id="arena" class="arena"><div id="status" class="status">Wähle ein Item und starte die Welle.</div><div id="hero" class="hero">🧙‍♂️</div><div class="heroHp"><div id="heroHp"></div></div></section>
<section class="panel"><h2>🎁 Wähle 1 von 3 Items</h2><div id="choices" class="choices"></div></section>
<section class="panel"><h2>🎒 Rucksack – 12 Plätze</h2><div id="grid" class="grid"></div><div class="help">Tippe zwei gleiche Items derselben Stufe nacheinander an, um sie zu fusionieren. Jedes Item belegt einen Platz.</div></section>
<div class="actions"><button id="start" class="main disabled">▶ Welle starten</button><button id="reset" class="main secondary">↻ Neustart</button></div>
</main>
<script>
const ITEMS=[
 {n:'Dolch',i:'🗡️',d:7,rate:900},{n:'Axt',i:'🪓',d:11,rate:1300},{n:'Bogen',i:'🏹',p:'➶',d:8,rate:750},
 {n:'Hammer',i:'🔨',d:14,rate:1550},{n:'Feuer',i:'🔥',d:10,rate:1000},{n:'Eis',i:'❄️',d:6,rate:650}
];
const MONSTERS=[['Skelett','💀'],['Goblin','👺'],['Zombie','🧟'],['Ork','👹'],['Dämon','😈'],['Drache','🐲']];
let s,timer,last=0; const $=x=>document.getElementById(x);
function reset(){clearInterval(timer);s={wave:1,kills:0,hp:100,inv:Array(12).fill(null),picked:false,running:false,selected:null,enemies:[],shots:[]};offers();render()}
function offers(){s.offer=Array.from({length:3},()=>({...ITEMS[Math.floor(Math.random()*ITEMS.length)],lvl:1}));s.picked=false}
function pick(i){if(s.picked||s.running)return;let k=s.inv.findIndex(x=>!x);if(k<0)return;s.inv[k]={...s.offer[i],id:Date.now()+Math.random()};s.picked=true;render()}
function slot(i){let x=s.inv[i];if(!x||s.running)return;if(s.selected===null){s.selected=i;render();return}if(s.selected===i){s.selected=null;render();return}let a=s.inv[s.selected];if(a&&a.n===x.n&&a.lvl===x.lvl){a.lvl++;s.inv[i]=null;s.selected=null;$('status').textContent=a.n+' wurde zu Stufe '+a.lvl+' fusioniert!'}else{s.selected=i}render()}
function start(){if(!s.picked||s.running||s.hp<=0)return;s.running=true;s.selected=null;s.enemies=[];s.shots=[];let count=2+Math.floor(s.wave*1.25),spawned=0;spawn();let spawnTimer=setInterval(()=>{if(!s.running){clearInterval(spawnTimer);return}if(spawned<count)spawn();else clearInterval(spawnTimer)},950);
function spawn(){if(spawned>=count)return;spawned++;let m=MONSTERS[Math.min(MONSTERS.length-1,Math.floor((s.wave-1)/3))];let max=24+s.wave*10;s.enemies.push({id:Math.random(),n:m[0],i:m[1],x:470,hp:max,max,speed:.38+s.wave*.025});}
last=performance.now();timer=setInterval(loop,35);render()}
function loop(){if(!s.running)return;let now=performance.now(),dt=now-last;last=now;
s.enemies.forEach(e=>e.x-=e.speed*dt);
for(let e of s.enemies){if(e.x<82){s.hp-=5+s.wave*.8;e.hp=0}}
s.enemies=s.enemies.filter(e=>e.hp>0);
s.inv.forEach((it,idx)=>{if(!it)return;if(!it.next)it.next=0;if(now>=it.next&&s.enemies.length){let target=s.enemies.reduce((a,b)=>a.x<b.x?a:b);let dmg=it.d*Math.pow(1.75,it.lvl-1);s.shots.push({x:72,y:120+(idx%4)*3,tx:target.id,icon:it.p||it.i,dmg,speed:.55});it.next=now+it.rate/Math.pow(1.12,it.lvl-1)}})
s.shots.forEach(p=>{let e=s.enemies.find(q=>q.id===p.tx);if(!e){p.dead=true;return}p.x+=p.speed*dt;if(p.x>=e.x){e.hp-=p.dmg;p.dead=true;if(e.hp<=0){s.kills++}}});s.shots=s.shots.filter(p=>!p.dead);s.enemies=s.enemies.filter(e=>e.hp>0);
if(s.hp<=0){s.hp=0;s.running=false;clearInterval(timer);$('status').textContent='Du wurdest besiegt – Welle '+s.wave+' erreicht.'}
else if(spawned>=count&&s.enemies.length===0){s.running=false;clearInterval(timer);s.wave++;s.hp=Math.min(100,s.hp+12);offers();$('status').textContent='Welle geschafft! Wähle dein nächstes Item.'}
renderArena();render()}
function renderArena(){document.querySelectorAll('.enemy,.projectile').forEach(x=>x.remove());s.enemies.forEach(e=>{let d=document.createElement('div');d.className='enemy';d.style.transform=`translateX(${e.x-470}px)`;d.innerHTML=`<span class="enemyName">${e.n}</span><span class="enemyBar"><div style="width:${Math.max(0,e.hp/e.max*100)}%"></div></span>${e.i}`;$('arena').appendChild(d)});s.shots.forEach(p=>{let d=document.createElement('div');d.className='projectile';d.style.left=p.x+'px';d.style.top=p.y+'px';d.textContent=p.icon;$('arena').appendChild(d)})}
function render(){$('wave').textContent=s.wave;$('kills').textContent=s.kills;$('hpText').textContent=Math.ceil(s.hp);$('heroHp').style.width=s.hp+'%';$('used').textContent=s.inv.filter(Boolean).length;
$('choices').innerHTML=s.offer.map((x,i)=>`<div class="choice"><span class="icon">${x.i}</span><b>${x.n}</b><br>⚔️ ${x.d}<br><button onclick="pick(${i})" ${s.picked||s.running||s.inv.every(Boolean)?'disabled':''}>Nehmen</button></div>`).join('');
$('grid').innerHTML=s.inv.map((x,i)=>x?`<div onclick="slot(${i})" class="slot filled ${s.selected===i?'selected':''}"><span class="lvl">★${x.lvl}</span><span class="itemIcon">${x.i}</span><span class="name">${x.n}</span></div>`:`<div class="slot"></div>`).join('');
$('start').className='main '+(!s.picked||s.running||s.hp<=0?'disabled':'');$('start').textContent=s.running?'⚔️ Welle läuft…':'▶ Welle starten';renderArena()}
$('start').onclick=start;$('reset').onclick=reset;reset();
</script></body></html>
