<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Backpack Survival</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#17130f;color:#f5e6c8;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
.app{max-width:520px;margin:auto;padding:calc(12px + env(safe-area-inset-top)) 14px calc(20px + env(safe-area-inset-bottom));min-height:100vh;background:linear-gradient(#211a12,#100d0a)}
h1{font-size:24px;margin:4px 0 8px;color:#ffd36b}.top{display:flex;justify-content:space-between;gap:8px;font-weight:700}
.pill{background:#35291d;border:1px solid #72542d;border-radius:12px;padding:7px 10px}.battle,.section{margin-top:12px;padding:12px;background:#241b14;border:1px solid #5f4328;border-radius:18px}
.fighters{display:flex;align-items:center;justify-content:space-around;font-size:64px;min-height:105px}.vs{font-size:20px;color:#e7a84a}
.bars{display:grid;grid-template-columns:1fr 1fr;gap:12px}.bar{height:12px;background:#4a1818;border-radius:9px;overflow:hidden}.fill{height:100%;background:#3db55c}.enemyfill{background:#d94c42}
.status{text-align:center;min-height:24px;margin-top:8px;color:#e9c98f}h2{font-size:17px;margin:0 0 10px}.choices{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.choice,.item{border:1px solid #7b5b32;background:#3a2b1d;color:#fff;border-radius:12px;padding:9px;text-align:center}.choice{min-height:105px;font-size:13px}.icon{font-size:32px;display:block}
button{border:0;border-radius:9px;padding:9px;background:#d69232;color:#1d1207;font-weight:800}.choice button{margin-top:6px}.choice button:disabled{opacity:.4}
.inventory{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.item{position:relative;min-height:82px;font-size:11px}.lvl{position:absolute;right:5px;top:4px;background:#8c4f1f;border-radius:7px;padding:2px 5px}
.hint{font-size:12px;color:#baa98c;margin-top:8px}.actions{display:flex;gap:8px;margin-top:12px}.main{flex:1;font-size:16px;padding:12px}.secondary{background:#5d4b37;color:#fff}.disabled{opacity:.45;pointer-events:none}
footer{text-align:center;color:#7f715f;font-size:11px;margin-top:14px}
</style>
</head><body><main class="app">
<h1>⚔️ Backpack Survival</h1>
<div class="top"><div class="pill">Runde <span id="round">1</span></div><div class="pill">🪙 <span id="gold">0</span></div><div class="pill">❤️ <span id="hpText">100</span>/100</div></div>
<section class="battle"><div class="fighters"><span>🧙‍♂️</span><span class="vs">VS</span><span id="enemy">💀</span></div>
<div class="bars"><div class="bar"><div id="hp" class="fill"></div></div><div class="bar"><div id="ehp" class="fill enemyfill"></div></div></div><div id="status" class="status">Wähle ein Item.</div></section>
<section class="section"><h2>🎁 Wähle 1 von 3 Items</h2><div id="choices" class="choices"></div></section>
<section class="section"><h2>🎒 Dein Rucksack <span id="slots">0/12</span></h2><div id="inventory" class="inventory"></div><div class="hint">Zwei gleiche Items derselben Stufe verschmelzen automatisch.</div></section>
<div class="actions"><button id="fight" class="main disabled">⚔️ Kampf starten</button><button id="reset" class="main secondary">↻ Neustart</button></div>
<footer>Backpack Survival · Prototyp</footer></main>
<script>
const TYPES=[{n:'Schwert',i:'🗡️',atk:8},{n:'Axt',i:'🪓',atk:11},{n:'Bogen',i:'🏹',atk:9},{n:'Schild',i:'🛡️',def:5},{n:'Trank',i:'🧪',heal:8},{n:'Feuerstab',i:'🔥',atk:13}];
const ENEMIES=[['Skelett','💀'],['Goblin','👺'],['Zombie','🧟'],['Ork','👹'],['Dämon','😈'],['Drache','🐲']];
let s;const $=id=>document.getElementById(id);
function init(){s={round:1,gold:0,hp:100,inv:[],picked:false,fighting:false};newRound();render()}
function offers(){return Array.from({length:3},()=>({...TYPES[Math.floor(Math.random()*TYPES.length)],lvl:1}))}
function newRound(){s.picked=false;s.offers=offers();let e=ENEMIES[Math.min(ENEMIES.length-1,Math.floor((s.round-1)/3))];s.enemy={icon:e[1],max:45+s.round*16,hp:45+s.round*16,atk:3+s.round*1.6};$('status').textContent='Wähle ein Item für deinen Rucksack.'}
function pick(x){if(s.picked||s.inv.length>=12)return;s.inv.push({...s.offers[x]});s.picked=true;merge();render();$('status').textContent='Bereit! Starte den Kampf.'}
function merge(){let c=true;while(c){c=false;outer:for(let a=0;a<s.inv.length;a++)for(let b=a+1;b<s.inv.length;b++){let x=s.inv[a],y=s.inv[b];if(x.n===y.n&&x.lvl===y.lvl){s.inv.splice(b,1);x.lvl++;c=true;break outer}}}}
function stats(){let atk=4,def=0,heal=0;s.inv.forEach(x=>{let m=Math.pow(1.8,x.lvl-1);atk+=(x.atk||0)*m;def+=(x.def||0)*m;heal+=(x.heal||0)*m});return{atk,def,heal}}
function fight(){if(!s.picked||s.fighting)return;s.fighting=true;render();let st=stats(),tick=0;$('status').textContent='Der Kampf beginnt…';let timer=setInterval(()=>{tick++;s.enemy.hp-=Math.max(1,st.atk*(.7+Math.random()*.6));if(s.enemy.hp<=0){s.enemy.hp=0;clearInterval(timer);win();render();return}let dmg=Math.max(1,s.enemy.atk-st.def*.22);s.hp-=dmg;if(tick%3===0&&st.heal)s.hp=Math.min(100,s.hp+st.heal*.25);if(s.hp<=0){s.hp=0;clearInterval(timer);s.fighting=false;$('status').textContent='Besiegt! Runde '+s.round+' erreicht. Tippe Neustart.';render();return}render()},520)}
function win(){s.fighting=false;let r=5+s.round*2;s.gold+=r;s.round++;s.hp=Math.min(100,s.hp+18);$('status').textContent='Sieg! +'+r+' Gold.';setTimeout(()=>{newRound();render()},900)}
function render(){$('round').textContent=s.round;$('gold').textContent=Math.floor(s.gold);$('hpText').textContent=Math.max(0,Math.ceil(s.hp));$('hp').style.width=s.hp+'%';$('enemy').textContent=s.enemy.icon;$('ehp').style.width=Math.max(0,s.enemy.hp/s.enemy.max*100)+'%';$('slots').textContent=s.inv.length+'/12';
$('choices').innerHTML=s.offers.map((x,i)=>`<div class="choice"><span class="icon">${x.i}</span><b>${x.n}</b><br><small>${x.atk?'⚔️ '+x.atk:x.def?'🛡️ '+x.def:'❤️ '+x.heal}</small><br><button onclick="pick(${i})" ${s.picked||s.fighting?'disabled':''}>Nehmen</button></div>`).join('');
$('inventory').innerHTML=s.inv.map(x=>`<div class="item"><span class="lvl">★${x.lvl}</span><span class="icon">${x.i}</span>${x.n}</div>`).join('');
$('fight').className='main '+(!s.picked||s.fighting||s.hp<=0?'disabled':'');$('fight').textContent=s.fighting?'⚔️ Kämpft…':'⚔️ Kampf starten'}
$('fight').onclick=fight;$('reset').onclick=init;init();
</script></body></html>
